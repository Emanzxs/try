<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NORECO I – Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="assets/noreco-logo.jpeg" alt="NORECO I">
      <h2>NORECO I</h2>
      <p>ElectService — ECMS Portal</p>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('resident',this)">👤 Resident</button>
      <button class="role-tab" onclick="setRole('staff',this)">🏢 Staff</button>
      <button class="role-tab" onclick="setRole('admin',this)">🛡️ Admin</button>
    </div>
    <div id="loginSection">
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
          <span class="error" id="emailErr"></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div class="forgot-link"><a href="#">Forgot password?</a></div>
        <button type="submit" class="btn btn-blue btn-full" id="loginBtn">Sign In →</button>
      </form>
      <div class="signup-link">No account? <a href="#" onclick="toggleSection('register')">Register here</a></div>
    </div>
    <div id="registerSection" style="display:none;">
      <form id="registerForm">
        <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="Juan Dela Cruz" required></div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required>
          <span class="error" id="regEmailErr"></span>
        </div>
        <div class="form-group"><label>Password (min 6 characters)</label><input type="password" id="regPass" placeholder="••••••••" required minlength="6"></div>
        <button type="submit" class="btn btn-blue btn-full">Create Account →</button>
      </form>
      <div class="signup-link">Have an account? <a href="#" onclick="toggleSection('login')">Sign in</a></div>
    </div>
    <div class="form-info" style="margin-top:1.5rem;margin-bottom:0;font-size:.82rem;">
      <strong>Demo:</strong> resident@noreco.ph / pass123 &nbsp;|&nbsp; staff@noreco.ph / staff123 &nbsp;|&nbsp; admin@noreco.ph / admin123
    </div>
  </div>
</div>
<script type="module">
import { auth, db, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         collection, addDoc, getDocs, query, where, serverTimestamp } from './firebase-config.js';
let selectedRole='resident';
window.setRole=(role,el)=>{selectedRole=role;document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');};
window.toggleSection=(s)=>{document.getElementById('loginSection').style.display=s==='login'?'block':'none';document.getElementById('registerSection').style.display=s==='register'?'block':'none';};
function toast(msg,type='info'){const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<span>${type==='success'?'✓':'ℹ'}</span> ${msg}`;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}

document.getElementById('loginForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  const btn=document.getElementById('loginBtn');
  document.getElementById('emailErr').textContent='';
  btn.textContent='Signing in…';btn.disabled=true;
  try{
    const cred=await signInWithEmailAndPassword(auth,email,pass);
    const snap=await getDocs(query(collection(db,'users'),where('uid','==',cred.user.uid)));
    let role=selectedRole,name=email.split('@')[0];
    if(!snap.empty){const d=snap.docs[0].data();role=d.role||role;name=d.name||name;}
    localStorage.setItem('ecmsUser',JSON.stringify({email,role,name,uid:cred.user.uid}));
    toast('Welcome back, '+name+'!','success');
    setTimeout(()=>{
      if(role==='admin') window.location.href='admin.html';
      else if(role==='staff') window.location.href='dashboard.html';
      else window.location.href='index.html';
    },1000);
  }catch(err){
    btn.textContent='Sign In →';btn.disabled=false;
    document.getElementById('emailErr').textContent=
      (err.code==='auth/invalid-credential'||err.code==='auth/user-not-found')?'Invalid email or password.':
      err.code==='auth/too-many-requests'?'Too many attempts. Try later.':err.message;
  }
});

document.getElementById('registerForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pass=document.getElementById('regPass').value;
  document.getElementById('regEmailErr').textContent='';
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await addDoc(collection(db,'users'),{uid:cred.user.uid,name,email,role:selectedRole,createdAt:serverTimestamp()});
    localStorage.setItem('ecmsUser',JSON.stringify({email,role:selectedRole,name,uid:cred.user.uid}));
    toast('Account created! Welcome.','success');
    setTimeout(()=>{window.location.href='index.html';},1000);
  }catch(err){
    document.getElementById('regEmailErr').textContent=err.code==='auth/email-already-in-use'?'Email already registered.':err.message;
  }
});
</script>
</body>
</html>
